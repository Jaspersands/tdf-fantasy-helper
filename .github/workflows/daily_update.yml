name: Daily Data Scraper Update

on:
  schedule:
    # Runs at 18:00 UTC (6:00 PM) every day after Tour de France stages finish
    - cron: '0 18 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions dashboard

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4

      - name: Run Scraper Engine
        run: |
          python update_data.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add riders_data.json stages_data.json
          git diff-index --quiet HEAD || git commit -m "Auto-update race and stage datasets [skip ci]"
          git push
